<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>QuerySelector</title>
  </head>
  <body>
    Enter to search <input type="" id="select" />

    <table border="1">
      <tr>
        <th>roll</th>
        <th>Name</th>
        <th>Class Name</th>
      </tr>

      {% for i in data %}
      <tr>
        <td>{{ i.roll }}</td>
        <td>{{ i.name }}</td>
        <td>{{ i.classname }}</td>
      </tr>
      {% endfor %}
    </table>
  </body>
</html>
