<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Entry sheet</title>
  </head>
  <body>
    <form method="POST">
      {% csrf_token %} Enter roll no.
      <input type="number" name="roll" /><br /><br />

      Enter Name
      <input type="text" name="name" /><br /><br />
      Class Name
      <input type="text" name="classname" /><br /><br />

      <input type="submit" value="Submit" />
    </form>
    {% if msg %}
    <script>
      alert("{{ msg }}");
    </script>
    {% endif %}
  </body>
</html>
